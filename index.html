<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Personne 3 - Carte Madagascar</title>
    <link rel="stylesheet" href="css/leaflet.css" />
    <link rel="stylesheet" href="css/map.css">
    <link rel="stylesheet" href="css/panel.css">
    <link rel="stylesheet" href="css/features.css">
</head>
<body>
    <div id="controls" class="map-controls">
        <select id="category-filter">
            <option value="">Toutes les régions</option>
            <option value="faune">Faune</option>
            <option value="flore">Flore</option>
            <option value="aires_protegees">Aires protégées</option>
        </select>
        <input id="species-search" type="text" placeholder="Rechercher une espèce...">
    </div>

    <div id="map"></div>

    <script src="js/leaflet.js"></script>
    <script src="js/map-init.js"></script>
    <script src="js/info-panel.js"></script>
    <script src="js/features.js"></script>

    <script>
        // Initialiser la carte
        const map = initMap();
        loadBaseLayer(map);

        let allRegionsData = null;

        // Callback pour le clic => affiche le panneau info (faune/flore)
        // info-panel.js expose window.handleRegionClick(feature, layer)
        function onRegionClick(feature, layer) {
            if (typeof window.handleRegionClick === 'function') {
                window.handleRegionClick(feature, layer);
            }
        }

        function applyStyleToRegion(layer, regionName, visible, colorByRegion) {
            const nextStyle = {
                fillColor: colorByRegion[regionName] || '#4CAF50',
                fillOpacity: visible ? 0.6 : 0.05,
                color: visible ? '#2E7D32' : '#999999',
                weight: 2,
                opacity: visible ? 1 : 0.2
            };
            layer._currentStyle = nextStyle; // mémorisé pour survivre au survol (voir map-init.js)
            layer.setStyle(nextStyle);
        }

        // Charger en parallèle la couche des régions et les données faune/flore
        Promise.all([
            loadRegionsLayer(map, './data/regions_madagascar.json', onRegionClick),
            window.loadFaunaFloreData().then((data) => { allRegionsData = data; })
        ]).then(() => {
            buildLegend(map, null);

            document.getElementById('category-filter').addEventListener('change', (e) => {
                const category = e.target.value;

                if (!category) {
                    // Réinitialisation : tout redevient visible avec le style par défaut
                    map._regionsLayer.eachLayer((layer) => {
                        layer._currentStyle = styleRegion(layer.feature);
                        layer.setStyle(layer._currentStyle);
                    });
                    return;
                }

                const { visibleRegions, colorByRegion } = filterByCategory(category, allRegionsData);

                map._regionsLayer.eachLayer((layer) => {
                    const regionName = window.getRegionNameFromFeature(layer.feature);
                    const visible = visibleRegions.includes(regionName);
                    applyStyleToRegion(layer, regionName, visible, colorByRegion);
                });
            });

            document.getElementById('species-search').addEventListener('input', (e) => {
                const query = e.target.value.trim();

                if (!query) {
                    map._regionsLayer.eachLayer((layer) => {
                        layer._currentStyle = styleRegion(layer.feature);
                        layer.setStyle(layer._currentStyle);
                    });
                    return;
                }

                const { matches } = searchSpecies(query, allRegionsData);
                const matchNames = matches.map((m) => m.region);

                map._regionsLayer.eachLayer((layer) => {
                    const regionName = window.getRegionNameFromFeature(layer.feature);
                    const visible = matchNames.includes(regionName);
                    applyStyleToRegion(layer, regionName, visible, {});
                });
            });

            console.log('Carte initialisée !');
        });
    </script>
</body>
</html>

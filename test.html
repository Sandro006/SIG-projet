<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Test Personne 3 - Carte Madagascar</title>
    <link rel="stylesheet" href="css/leaflet.css" />
    <link rel="stylesheet" href="css/map.css" />
  </head>
  <body>
    <div id="map"></div>

    <script src="js/leaflet.js"></script>
    <script src="js/map-init.js"></script>

    <script>
      // Initialiser la carte
      const map = initMap();
      loadBaseLayer(map);

      // Callback pour le clic (mettrer la fonction onRegionClick ici pour la personne 4)
      function onRegionClick(feature) {
        const nom =
          feature.properties.nom_region ||
          feature.properties.NAME_2 ||
          "Inconnue";
        alert("🦎 Région: " + nom);
        console.log("Région cliquée:", nom);
      }

      // Charger les régions
      loadRegionsLayer(map, "./data/regions_madagascar.json", onRegionClick);

      console.log(" Carte initialisée !");
    </script>
  </body>
</html>
